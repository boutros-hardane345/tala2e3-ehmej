<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول - طلائع إهمج</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body.lent { --crimson: #5E2A4A; --crimson-deep: #3B1E31; --gold: #B89A40; --grad-crimson: linear-gradient(135deg, #3B1E31 0%, #5E2A4A 100%); }
        body.advent { --crimson: #4C2F4B; --crimson-deep: #2C1C2B; --gold: #C9A84C; --grad-crimson: linear-gradient(135deg, #2C1C2B 0%, #4C2F4B 100%); }
        body.christmas { --crimson: #9B2E2E; --crimson-deep: #701F1F; --gold: #F5D742; --grad-crimson: linear-gradient(135deg, #701F1F 0%, #B43B3B 100%); }
        body.easter { --crimson: #B3413A; --crimson-deep: #8B2C2C; --gold: #F5E56B; --grad-crimson: linear-gradient(135deg, #8B2C2C 0%, #B3413A 100%); }
        body.ordinary { --crimson: #2C6E2F; --crimson-deep: #1F4F21; --gold: #C9B36B; --grad-crimson: linear-gradient(135deg, #1F4F21 0%, #2C6E2F 100%); }
        .particle {
            position: absolute; pointer-events: none; will-change: transform, opacity;
            filter: blur(0.6px); z-index: 9999;
        }
        .particle.snow { background: radial-gradient(circle at 30% 30%, #ffffff, #d4eaff); border-radius: 50%; box-shadow: 0 0 8px rgba(255,255,240,0.8); }
        .particle.petal { background: linear-gradient(145deg, #FFB7C5, #FF8DA1); border-radius: 150% 0 150% 0; transform: rotate(45deg); opacity: 0.8; }
        .particle.leaf { background: radial-gradient(ellipse at 40% 40%, #D4783A, #9B4B1A); border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; opacity: 0.7; }
        .particle.sun { background: radial-gradient(circle, rgba(255,220,100,0.85), rgba(255,180,50,0.3)); border-radius: 50%; box-shadow: 0 0 12px rgba(255,200,50,0.6); }
        .particle.star { background: radial-gradient(circle, #FFF5B0, #FFE55C); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); width: 12px !important; height: 12px !important; }
        @keyframes floatFall { 0% { transform: translateY(-15vh) rotate(0deg) translateX(0); opacity: 0.9; } 100% { transform: translateY(110vh) rotate(360deg) translateX(30px); opacity: 0; } }
        @keyframes gentleDrift { 0% { transform: translateY(-12vh) rotate(0deg) translateX(0); opacity: 0.85; } 100% { transform: translateY(110vh) rotate(520deg) translateX(-25px); opacity: 0; } }
        .login-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }
        .login-card {
            background: var(--white);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(201,168,76,0.15);
            text-align: center;
        }
        .login-card .lock-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: block;
        }
        .login-card h2 {
            font-family: 'Amiri', serif;
            color: var(--crimson-deep);
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
        }
        .login-card p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .login-card .input-group {
            text-align: right;
            margin-bottom: 1.5rem;
        }
        .login-card .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-mid);
            display: block;
            margin-bottom: 0.4rem;
        }
        .login-card .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 2px solid var(--gray-300);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: var(--transition-fast);
            text-align: center;
        }
        .login-card .input-group input:focus {
            border-color: var(--crimson);
            box-shadow: 0 0 0 4px rgba(122,0,0,0.1);
        }
        .login-card .btn-login {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 12px;
            background: var(--grad-crimson);
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 16px rgba(122,0,0,0.3);
        }
        .login-card .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(122,0,0,0.4);
        }
        .login-error {
            color: #b22234;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            background: #fff0f0;
            padding: 0.5rem 1rem;
            border-radius: 10px;
        }
        .login-card .forgot-link {
            display: block;
            margin-top: 1.2rem;
            font-size: 0.8rem;
            color: var(--text-light);
            text-decoration: none;
        }
        .login-card .forgot-link:hover {
            color: var(--crimson);
        }
        .login-card .logo-small {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: block;
            border: 3px solid var(--gold-pale);
        }
    </style>
</head>
<body>
<script src="js/config.js"></script>
<div id="season-container"></div>

<nav>
    <div class="logo">
        <img src="images/logo.jpg" alt="Logo">
        <img src="images/chi3ar2026.png" alt="Chi3ar">
    </div>
    <h1>أخوية طلائع العذراء – إهمج</h1>
    <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="about.html">من نحن</a></li>
        <li><a href="activities.html">نشاطاتنا</a></li>
        <li><a href="contact.html">مكتبتي</a></li>
        <li><a href="dashboard.html">⚙️</a></li>
    </ul>
</nav>

<section class="login-section">
    <div class="login-card">
        <img src="images/logo.jpg" alt="Logo" class="logo-small">
        <span class="lock-icon">🔐</span>
        <h2>لوحة التحكم</h2>
        <p>أدخل البريد الإلكتروني وكلمة السر للدخول</p>
        <div class="input-group">
            <label>البريد الإلكتروني</label>

        </div>
        <button class="btn-login" id="loginBtn">دخول</button>
        <div class="login-error" id="loginError"></div>
        <a href="index.html" class="forgot-link">← العودة إلى الرئيسية</a>
    </div>
</section>

<footer>
    <p>© ٢٠٢٦ جميع الحقوق محفوظة - أخوية طلائع العذراء – إهمج</p>
    <div class="footer-links">
        <a href="index.html">الرئيسية</a>
        <a href="about.html">من نحن</a>
        <a href="activities.html">نشاطاتنا</a>
        <a href="contact.html">مكتبتي</a>
    </div>
</footer>

<script src="js/config.js"></script>
<script>
    // ==================== LITURGICAL CALENDAR & SEASONAL PARTICLES ====================
    (function() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        const day = now.getDate();
        
        let liturgicalSeason = 'ordinary';
        let seasonNameArabic = 'الزمن العادي';
        let particleType = 'leaf';
        let particleCount = 55;
        
        function getEasterDate(y) {
            if(y === 2026) return new Date(2026, 3, 5);
            if(y === 2025) return new Date(2025, 3, 20);
            if(y === 2027) return new Date(2027, 2, 28);
            return new Date(y, 2, 31);
        }
        
        const easterDate = getEasterDate(year);
        const lentStart = new Date(easterDate);
        lentStart.setDate(easterDate.getDate() - 46);
        const lentEnd = new Date(easterDate);
        lentEnd.setDate(easterDate.getDate() - 1);
        const easterSeasonEnd = new Date(easterDate);
        easterSeasonEnd.setDate(easterDate.getDate() + 50);
        
        const isAdvent = (month === 10 && day >= 30) || (month === 11 && day <= 24);
        const isChristmas = (month === 11 && day >= 25) || (month === 0 && day <= 13);
        const isLent = now >= lentStart && now <= lentEnd;
        const isEasterSeason = now >= easterDate && now <= easterSeasonEnd;
        
        if(isChristmas) {
            liturgicalSeason = 'christmas';
            seasonNameArabic = 'زمن الميلاد المجيد ✨';
            particleType = 'star';
            particleCount = 70;
        } 
        else if(isLent) {
            liturgicalSeason = 'lent';
            seasonNameArabic = 'زمن الصوم الكبير 🕯️';
            particleType = 'leaf';
            particleCount = 45;
        }
        else if(isEasterSeason) {
            liturgicalSeason = 'easter';
            seasonNameArabic = 'زمن القيامة المجيدة 🌅';
            particleType = 'petal';
            particleCount = 85;
        }
        else if(isAdvent) {
            liturgicalSeason = 'advent';
            seasonNameArabic = 'زمن المجيء (الانتظار) 🕯️';
            particleType = 'snow';
            particleCount = 60;
        }
        else {
            const m = month;
            if(m >= 2 && m <= 4) { particleType = 'petal'; particleCount = 70; seasonNameArabic = 'زمن البهجة – ربيع العذراء'; }
            else if(m >= 5 && m <= 8) { particleType = 'sun'; particleCount = 40; seasonNameArabic = 'زمن النمو – صيف الخدمة'; }
            else if(m >= 9 && m <= 10) { particleType = 'leaf'; particleCount = 65; seasonNameArabic = 'زمن العطاء – خريف البركات'; }
            else { particleType = 'snow'; particleCount = 55; seasonNameArabic = 'زمن الرجاء – شتاء المحبة'; }
        }
        
        document.body.classList.add(liturgicalSeason);
        
        // Enhanced Particles System
        const container = document.getElementById('season-container');
        if(container) {
            container.innerHTML = '';
            const isMobile = window.innerWidth < 768;
            let finalCount = isMobile ? Math.floor(particleCount * 0.5) : particleCount;
            finalCount = Math.min(finalCount, 110);
            const animationStyle = particleType === 'petal' ? 'gentleDrift' : 'floatFall';
            
            for(let i=0; i<finalCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle', particleType);
                
                let size = 0;
                if(particleType === 'snow') size = Math.random() * 10 + 5;
                else if(particleType === 'petal') size = Math.random() * 12 + 7;
                else if(particleType === 'leaf') size = Math.random() * 14 + 6;
                else if(particleType === 'sun') size = Math.random() * 8 + 5;
                else if(particleType === 'star') size = Math.random() * 10 + 8;
                else size = Math.random() * 8 + 4;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                const duration = Math.random() * 9 + 7;
                const delay = Math.random() * 8;
                particle.style.animation = `${animationStyle} ${duration}s linear ${delay}s infinite`;
                particle.style.top = -Math.random() * 100 + 'vh';
                
                if(particleType === 'petal' || particleType === 'leaf') {
                    particle.style.transform = `rotate(${Math.random() * 360}deg)`;
                }
                container.appendChild(particle);
            }
        }
        
        // Active nav state
        const currentPage = window.location.pathname.split('/').pop() || 'login.html';
        document.querySelectorAll('.nav-links a').forEach(link => {
            if(link.getAttribute('href') === currentPage) link.classList.add('active');
            else link.classList.remove('active');
        });
    })();

    // ==================== LOGIN LOGIC (API) ====================
    (function() {
        var loginBtn = document.getElementById('loginBtn');
        var emailInput = document.getElementById('emailInput');
        var pwdInput = document.getElementById('passwordInput');
        var errorEl = document.getElementById('loginError');

        if (localStorage.getItem('tala2e3_token')) {
            window.location.href = 'dashboard.html';
            return;
        }

        function tryLogin() {
            var email = emailInput.value.trim();
            var pwd = pwdInput.value;
            if (!email || !pwd) {
                errorEl.textContent = 'الرجاء إدخال البريد الإلكتروني وكلمة السر.';
                errorEl.style.display = 'block';
                return;
            }
            errorEl.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'جاري التحقق...';

            fetch(API_BASE_URL + '/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: email, password: pwd })
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.token) {
                    localStorage.setItem('tala2e3_token', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    errorEl.textContent = data.error || 'بيانات الدخول غير صحيحة.';
                    errorEl.style.display = 'block';
                    pwdInput.value = '';
                    pwdInput.focus();
                }
            }).catch(function() {
                errorEl.textContent = 'تعذر الاتصال بالخادم. تأكد من تشغيل الخادم.';
                errorEl.style.display = 'block';
            }).finally(function() {
                loginBtn.disabled = false;
                loginBtn.textContent = 'دخول';
            });
        }

        loginBtn.addEventListener('click', tryLogin);
        pwdInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') tryLogin();
        });
        emailInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') tryLogin();
        });
    })();
</script>

</body>
</html>
